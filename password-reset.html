<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OrchardOps Password Reset</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/assets/images/favicon.png">

  <style>
    :root {
      --bg: #eef3ec;
      --panel: #ffffff;
      --panel-border: #d7e2d4;
      --text: #1f2b20;
      --muted: #5f6b60;
      --accent: #4c8c2b;
      --accent-strong: #3a6a20;
      --success-bg: #e6f4e8;
      --success-text: #2e7d32;
      --error-bg: #fdecea;
      --error-text: #c62828;
      --input: #f7faf7;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Roboto, sans-serif;
      background:
        linear-gradient(160deg, #e8f1e5, #f5faf3 55%, #e3f0e0);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 460px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
    }

    .logo {
      display: block;
      width: 160px;
      margin: 0 auto 20px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.9rem;
      text-align: center;
      color: var(--accent-strong);
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.5;
      text-align: center;
    }

    .status {
      display: none;
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 16px;
      font-size: 0.95rem;
    }

    .status.show {
      display: block;
    }

    .status.success {
      background: var(--success-bg);
      color: var(--success-text);
      border: 1px solid #c8e6c9;
    }

    .status.error {
      background: var(--error-bg);
      color: var(--error-text);
      border: 1px solid #f5c6c4;
    }

    label {
      display: block;
      margin: 14px 0 8px;
      font-weight: 600;
      color: var(--text);
    }

    input {
      width: 100%;
      border: 1px solid var(--panel-border);
      border-radius: 12px;
      padding: 14px 16px;
      font: inherit;
      color: var(--text);
      background: var(--input);
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(76, 140, 43, 0.2);
    }

    button {
      width: 100%;
      margin-top: 18px;
      border: 0;
      border-radius: 14px;
      padding: 15px 18px;
      font: inherit;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.6;
      cursor: wait;
    }

    .hint {
      margin-top: 16px;
      font-size: 0.92rem;
      color: var(--muted);
      text-align: center;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>
  <main class="card">

    <img src="/assets/images/orchardops-logo.png" alt="OrchardOps Logo" class="logo">

    <h1>Reset your password</h1>
    <p>Choose a new password for your OrchardOps account.</p>

    <div id="status" class="status"></div>

    <form id="reset-form" novalidate>
      <label for="password">New password</label>
      <input id="password" name="password" type="password" minlength="8" autocomplete="new-password" required>

      <label for="confirm-password">Confirm password</label>
      <input id="confirm-password" name="confirm-password" type="password" minlength="8" autocomplete="new-password" required>

      <button id="submit-button" type="submit">Update password</button>
    </form>

    <p id="success-hint" class="hint hidden">
      Your password has been updated. You can return to OrchardOps and sign in with your new password.
    </p>
  </main>

  <!-- JS stays exactly the same -->
  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    const SUPABASE_URL = "https://jaoscmiqiihydkhjuupk.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_XLDu6r1EuDEx59UNSRkgVw_7ti2O_xD";

    const statusEl = document.getElementById("status");
    const formEl = document.getElementById("reset-form");
    const passwordEl = document.getElementById("password");
    const confirmPasswordEl = document.getElementById("confirm-password");
    const submitButtonEl = document.getElementById("submit-button");
    const successHintEl = document.getElementById("success-hint");

    const showStatus = (message, type) => {
      statusEl.textContent = message;
      statusEl.className = `status show ${type}`;
    };

    const clearStatus = () => {
      statusEl.textContent = "";
      statusEl.className = "status";
    };

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const hashParams = new URLSearchParams(window.location.hash.replace(/^#/, ""));
    const queryParams = new URLSearchParams(window.location.search);

    const accessToken = hashParams.get("access_token") || queryParams.get("access_token");
    const refreshToken = hashParams.get("refresh_token") || queryParams.get("refresh_token");
    const type = hashParams.get("type") || queryParams.get("type");

    const initializeRecoverySession = async () => {
      if (!accessToken || !refreshToken || type !== "recovery") {
        formEl.classList.add("hidden");
        showStatus(
          "This password reset link is invalid or has expired. Request a new reset email from OrchardOps.",
          "error"
        );
        return;
      }

      const { error } = await supabase.auth.setSession({
        access_token: accessToken,
        refresh_token: refreshToken
      });

      if (error) {
        formEl.classList.add("hidden");
        showStatus(
          error.message || "We could not verify this reset link. Request a new email and try again.",
          "error"
        );
        return;
      }

      window.history.replaceState({}, document.title, window.location.pathname);
    };

    formEl.addEventListener("submit", async (event) => {
      event.preventDefault();
      clearStatus();

      const password = passwordEl.value.trim();
      const confirmPassword = confirmPasswordEl.value.trim();

      if (password.length < 8) {
        showStatus("Use a password that is at least 8 characters long.", "error");
        return;
      }

      if (password !== confirmPassword) {
        showStatus("The passwords do not match.", "error");
        return;
      }

      submitButtonEl.disabled = true;

      const { error } = await supabase.auth.updateUser({ password });

      submitButtonEl.disabled = false;

      if (error) {
        showStatus(
          error.message || "Password update failed. Request a fresh reset link and try again.",
          "error"
        );
        return;
      }

      formEl.reset();
      formEl.classList.add("hidden");
      successHintEl.classList.remove("hidden");
      showStatus("Password updated successfully.", "success");
    });

    initializeRecoverySession();
  </script>
</body>
</html>
